<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification OTP - Security Web</title>
    <meta name="description" content="Vérifiez votre compte avec le code OTP">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-split { min-height:100vh; display:grid; grid-template-columns:1fr 1fr; }
        .auth-split-left {
            background:var(--blue-600); padding:3rem 4rem;
            display:flex; flex-direction:column; justify-content:space-between;
            position:relative; overflow:hidden; color:#fff;
        }
        .auth-split-left::before {
            content:''; position:absolute; top:-100px; right:-100px;
            width:300px; height:300px; border-radius:50%; background:rgba(255,255,255,0.08);
        }
        .auth-split-logo { display:flex; align-items:center; gap:0.65rem; font-weight:800; font-size:1.25rem; position:relative; z-index:1; }
        .auth-split-logo i { font-size:1.5rem; }
        .auth-split-hero { position:relative; z-index:1; margin-top:auto; margin-bottom:auto; }
        .auth-split-hero h2 { color:#fff; font-size:2.25rem; font-weight:800; margin-bottom:1rem; }
        .auth-split-hero p { color:rgba(255,255,255,0.8); font-size:1.1rem; line-height:1.6; }
        .auth-split-right {
            display:flex; align-items:center; justify-content:center;
            padding:3rem; background:var(--bg);
        }
        .auth-box { width:100%; max-width:420px; }
        .auth-box-header { text-align:center; margin-bottom:2rem; }
        .auth-box-header i {
            width:64px; height:64px; border-radius:var(--radius-lg);
            background:var(--blue-50); color:var(--blue-600);
            display:flex; align-items:center; justify-content:center;
            font-size:1.75rem; margin:0 auto 1rem;
        }
        .auth-box-header h1 { font-size:1.5rem; font-weight:700; margin-bottom:0.5rem; }
        .auth-box-header p { color:var(--text-soft); font-size:0.9rem; }
        .otp-inputs { display:flex; gap:0.75rem; justify-content:center; margin:2rem 0; }
        .otp-input {
            width:50px; height:60px;
            border:2px solid var(--bg-soft);
            border-radius:var(--radius);
            text-align:center;
            font-size:1.5rem;
            font-weight:700;
            color:var(--text);
            background:var(--bg-card);
            transition:all 0.2s ease;
        }
        .otp-input:focus {
            border-color:var(--blue-600);
            outline:none;
            box-shadow:0 0 0 3px var(--blue-100);
        }
        .otp-hint {
            text-align:center;
            color:var(--text-soft);
            font-size:0.85rem;
            margin-bottom:1.5rem;
        }
        .otp-hint strong { color:var(--blue-600); }
        .resend-section {
            text-align:center;
            margin-top:1.5rem;
            padding-top:1.5rem;
            border-top:1px solid var(--bg-soft);
        }
        .resend-btn {
            background:none;
            border:none;
            color:var(--blue-600);
            font-size:0.9rem;
            font-weight:500;
            cursor:pointer;
            display:inline-flex;
            align-items:center;
            gap:0.5rem;
        }
        .resend-btn:disabled {
            color:var(--text-xs);
            cursor:not-allowed;
        }
        .resend-timer {
            font-size:0.8rem;
            color:var(--text-xs);
            margin-top:0.5rem;
        }
        .btn-submit { width:100%; }
        .alert { margin-bottom:1rem; }
        @media(max-width:900px) {
            .auth-split { grid-template-columns:1fr; }
            .auth-split-left { display:none; }
            .auth-split-right { padding:2rem 1.5rem; min-height:100vh; }
            .otp-input { width:45px; height:55px; font-size:1.25rem; }
        }
    </style>
</head>
<body>
    <div class="auth-split">
        <!-- Left Panel -->
        <div class="auth-split-left">
            <div class="auth-split-logo">
                <i class="fa-solid fa-shield-halved"></i>
                Security Web
            </div>
            <div class="auth-split-hero">
                <h2>Vérifiez votre compte</h2>
                <p>Un code de vérification a été envoyé à votre adresse email. Saisissez-le pour activer votre compte.</p>
            </div>
            <div></div>
        </div>

        <!-- Right Panel -->
        <div class="auth-split-right">
            <!-- Mobile Header -->
            <div class="mobile-auth-header" style="display:none;">
                <i class="fa-solid fa-shield-halved"></i>
                <h2>Security Web</h2>
            </div>
            <div class="auth-box">
                <div class="auth-box-header">
                    <i class="fa-solid fa-envelope-open-text"></i>
                    <h1>Code de vérification</h1>
                    <p>Saisissez le code à 6 chiffres envoyé à <strong id="userEmail">votre email</strong></p>
                </div>

                <div id="verifyError" class="alert alert-error" style="display:none;"></div>

                <form id="otpForm">
                    <div class="otp-inputs">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="0">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="1">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="2">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="3">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="4">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="5">
                    </div>

                    <input type="hidden" id="fullOtp" name="otp">

                    <button type="submit" class="btn btn-submit" id="verifyBtn">
                        <span>Vérifier mon compte</span>
                        <i class="fa-solid fa-check"></i>
                    </button>
                </form>

                <div class="resend-section">
                    <button type="button" class="resend-btn" id="resendBtn" onclick="resendOTP()">
                        <i class="fa-solid fa-rotate"></i>
                        Renvoyer le code
                    </button>
                    <p class="resend-timer" id="resendTimer"></p>
                </div>

                <div style="text-align:center; margin-top:2rem;">
                    <a href="login.html" style="color:var(--text-soft); font-size:0.9rem;">
                        <i class="fa-solid fa-arrow-left"></i> Retour à la connexion
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let registeredEmail = localStorage.getItem('pendingEmail') || '';

        // Vérifier si redirection depuis login (compte non vérifié)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('unverified') === 'true') {
            const errorDiv = document.getElementById('verifyError');
            errorDiv.className = 'alert alert-warning';
            errorDiv.style.cssText = 'background:#f59e0b;color:#fff;display:flex;';
            errorDiv.textContent = 'Votre compte doit être vérifié. Veuillez saisir le code OTP envoyé à votre email.';
        }
        let resendCooldown = 30;

        // Afficher l'email
        document.getElementById('userEmail').textContent = registeredEmail || 'votre email';

        // Gestion des inputs OTP
        const otpInputs = document.querySelectorAll('.otp-input');
        const fullOtpInput = document.getElementById('fullOtp');

        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                const val = e.target.value;
                
                // N'accepter que les chiffres
                if (!/^\d*$/.test(val)) {
                    e.target.value = '';
                    return;
                }
                
                if (val.length === 1) {
                    // Passer au suivant
                    if (index < otpInputs.length - 1) {
                        otpInputs[index + 1].focus();
                    }
                }
                
                updateFullOtp();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });

            // Coller le code complet
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasteData = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
                
                pasteData.split('').forEach((char, i) => {
                    if (otpInputs[i]) {
                        otpInputs[i].value = char;
                    }
                });
                
                updateFullOtp();
                
                // Focus sur le dernier input rempli ou le suivant
                const nextIndex = Math.min(pasteData.length, 5);
                otpInputs[nextIndex].focus();
            });
        });

        function updateFullOtp() {
            const code = Array.from(otpInputs).map(i => i.value).join('');
            fullOtpInput.value = code;
        }

        // Vérification du formulaire
        document.getElementById('otpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const code = fullOtpInput.value;
            if (code.length !== 6) {
                showError('Veuillez saisir les 6 chiffres du code');
                return;
            }

            const btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Vérification...';

            try {
                const response = await fetch(`${API_BASE}/auth/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: registeredEmail,
                        code: code
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Code invalide');
                }

                // Succès - nettoyer et rediriger
                localStorage.removeItem('pendingEmail');
                showSuccess('Compte vérifié ! Redirection...');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);

            } catch (error) {
                showError(error.message);
                btn.disabled = false;
                btn.innerHTML = '<span>Vérifier mon compte</span><i class="fa-solid fa-check"></i>';
            }
        });

        // Renvoyer l'OTP
        async function resendOTP() {
            if (!registeredEmail) {
                showError('Session expirée. Veuillez recommencer l\'inscription.');
                return;
            }

            const btn = document.getElementById('resendBtn');
            const timer = document.getElementById('resendTimer');
            
            btn.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/auth/request-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: registeredEmail })
                });

                if (!response.ok) {
                    throw new Error('Erreur lors du renvoi');
                }

                // Démarrer le compte à rebours
                startResendTimer();

            } catch (error) {
                showError(error.message);
                btn.disabled = false;
            }
        }

        function startResendTimer() {
            const btn = document.getElementById('resendBtn');
            const timer = document.getElementById('resendTimer');
            let seconds = resendCooldown;
            
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Code renvoyé';
            
            const interval = setInterval(() => {
                timer.textContent = `Prochain renvoi possible dans ${seconds}s`;
                seconds--;
                
                if (seconds < 0) {
                    clearInterval(interval);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-rotate"></i> Renvoyer le code';
                    timer.textContent = '';
                }
            }, 1000);
        }

        function showError(msg) {
            const err = document.getElementById('verifyError');
            err.textContent = msg;
            err.style.display = 'flex';
            setTimeout(() => err.style.display = 'none', 5000);
        }

        function showSuccess(msg) {
            const err = document.getElementById('verifyError');
            err.className = 'alert alert-success';
            err.style.cssText = 'background:var(--green);color:#fff;display:flex;';
            err.textContent = msg;
        }

        // Focus automatique sur le premier input
        otpInputs[0].focus();
    </script>
</body>
</html>
